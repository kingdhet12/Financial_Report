<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - RESBI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="login" class="auth-page">
  <main class="auth-shell compact-auth">
    <section class="auth-hero">
      <a class="brand" href="index.html">
        <img src="assets/logo/resbi-logo.svg" alt="RESBI logo">
        <span><strong>RESBI</strong><small>Financial Dashboard</small></span>
      </a>
      <div class="auth-copy">
        <span class="eyebrow">Welcome Back</span>
        <h1>Financial Planner for Bebi & Resa</h1>
        <p>Masuk untuk mengelola transaksi, saldo, wishlist, paylater, dan laporan.</p>
      </div>
    </section>
    <section class="auth-card glass">
      <div class="section-head compact">
        <div><span class="eyebrow">Login</span><h2>Masuk Dashboard</h2></div>
      </div>
      <form id="loginForm" class="form-grid one" novalidate>
        <label><span>Email</span><input type="email" name="email" required></label>
        <label>
          <span>Password</span>
          <div class="input-action">
            <input type="password" name="password" minlength="6" required>
            <button class="icon-btn" id="togglePassword" type="button"><i class="fa-solid fa-eye"></i></button>
          </div>
        </label>
        <label class="check-row"><input type="checkbox" name="remember" checked><span>Remember session</span></label>
        <button class="btn primary full" type="submit"><i class="fa-solid fa-arrow-right-to-bracket"></i> Login</button>
      </form>
    </section>
  </main>
  <div class="toast-stack" id="toastStack"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
